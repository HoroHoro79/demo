<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Planazo pendiente! 🚀</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            display: flex;
            display: -webkit-box;
            display: -ms-flexbox;
            -webkit-box-pack: center;
            -ms-flex-pack: center;
            justify-content: center;
            -webkit-box-align: center;
            -ms-flex-align: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7d070; /* Color amarillo Toy Story */
            background-image: radial-gradient(#f9db93 20%, transparent 20%), radial-gradient(#f9db93 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            text-align: center;
            overflow: hidden;
        }

        .contenedor {
            background: white;
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 420px;
            z-index: 10;
            border: 4px solid #0056b3; /* Azul clásico */
        }

        h1 {
            color: #d9381e; /* Rojo Toy Story */
            font-size: 26px;
            margin-bottom: 30px;
            line-height: 1.4;
            font-weight: 900;
            text-shadow: 1px 1px 0px #fff;
        }

        .botones {
            display: flex;
            display: -webkit-box;
            display: -ms-flexbox;
            -webkit-box-pack: center;
            -ms-flex-pack: center;
            justify-content: center;
            gap: 20px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s ease;
            touch-action: manipulation;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #btn-si {
            background-color: #28a745; /* Verde Buzz Lightyear */
            color: white;
        }

        #btn-si:active {
            background-color: #1e7e34;
            transform: scale(0.95);
        }

        #btn-no {
            background-color: #dc3545;
            color: white;
            position: absolute;
            right: 35px; /* Posición inicial equilibrada */
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1 id="pregunta">¿Vendrías a ver Toy Story 5 conmigo? 🧸🚀</h1>
        <div class="botones">
            <button id="btn-si" onclick="aceptarCita()">¡SÍ!</button>
            <button id="btn-no" onmouseover="moverBoton(this)" ontouchstart="moverBoton(this)" onclick="moverBoton(this)">No</button>
        </div>
    </div>

    <script>
        function moverBoton(boton) {
            // Límites estrictos para iOS y Android para evitar que se esconda tras el teclado o notch
            const padding = 30;
            const anchoBoton = boton.offsetWidth || 90;
            const altoBoton = boton.offsetHeight || 45;
            
            const maxW = window.innerWidth - anchoBoton - padding;
            const maxH = window.innerHeight - altoBoton - padding;
            
            // Forzar posiciones completamente aleatorias por toda la pantalla del móvil
            const randomX = Math.max(padding, Math.floor(Math.random() * maxW));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxH));
            
            boton.style.position = "fixed";
            boton.style.left = randomX + "px";
            boton.style.top = randomY + "px";
        }

        function aceptarCita() {
            document.getElementById("pregunta").innerHTML = "¡Al infinito y más allá! 🚀 Prepárate, que tenemos planazo. 🥰🍿";
            document.getElementById("btn-no").style.display = "none";
            document.getElementById("btn-si").style.transform = "scale(1.3)";
            document.getElementById("btn-si").style.position = "static";
            document.getElementById("btn-si").onclick = null;
        }
    </script>

</body>
</html>
